<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zyfauna sign in</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#11291C;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#0d2016;
border:1px solid rgba(25,138,32,.4);
padding:40px;
border-radius:20px;
width:340px;
}

.logo{
text-align:center;
color:#A6FC97;
font-size:26px;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:10px;
border:1px solid rgba(25,138,32,.4);
background:#11291C;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#198A20;
color:white;
cursor:pointer;
margin-top:10px;
transition:.3s;
}

button:hover{
background:#A6FC97;
color:#11291C;
}

.divider{
text-align:center;
margin:18px 0;
color:#9fb2a9;
font-size:13px;
}

.signup button{
background:transparent;
border:1px solid #A6FC97;
color:#A6FC97;
margin-top:8px;
}

.signup button:hover{
background:#A6FC97;
color:#11291C;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">zyfauna</div>

<input type="email" placeholder="email">
<input type="password" placeholder="password">

<button>sign in</button>

<div class="divider">or</div>

<div class="signup">
<button>sign up as adopter</button>
<button>sign up as shelter</button>
</div>

</div>

</body>
</html>
